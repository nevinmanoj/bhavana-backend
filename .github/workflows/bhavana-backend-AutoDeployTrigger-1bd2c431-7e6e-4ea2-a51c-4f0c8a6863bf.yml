name: Trigger auto deployment for bhavana-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/bhavana-backend-AutoDeployTrigger-1bd2c431-7e6e-4ea2-a51c-4f0c8a6863bf.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BHAVANABACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BHAVANABACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BHAVANABACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}Dockerfile
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: bhavana.azurecr.io
          registryUsername: ${{ secrets.BHAVANABACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BHAVANABACKEND_REGISTRY_PASSWORD }}
          containerAppName: bhavana-backend
          resourceGroup: bhavana
          imageToBuild: bhavana.azurecr.io/bhavana-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


